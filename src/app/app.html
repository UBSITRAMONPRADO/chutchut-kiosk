<nav class="navbar">
  <div class="nav-brand">
    <img src="chutchut.jpg" alt="Chut Chut" class="brand-logo" />
    <div class="brand-text">
      <span class="brand-name">CHUT CHUT</span>
      <span class="brand-sub">Wings • Corndog • Bilo-Bilo</span>
    </div>
  </div>

  <div class="nav-links">
    <a routerLink="/" routerLinkActive="active-link" s[routerLinkActiveOptions]="{ exact: true }">
      Home
    </a>
    <a routerLink="/menu" routerLinkActive="active-link">
      Menu
    </a>
    <a routerLink="/cart" routerLinkActive="active-link" class="cart-link">
      🛒 Cart
      @if (cartService.cartCount() > 0) {
        <span class="cart-badge">{{ cartService.cartCount() }}</span>
      }
    </a>
  </div>
</nav>

<main>
  <router-outlet />
</main>
